<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DENIX</title>

  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginScreen">
  <div class="login-box">
    <img src="logoDenix.png" class="logo">
    <h2>DENIX</h2>
    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="app" id="dashboard" style="display:none;">

  <!-- SIDEBAR -->
  <div class="sidebar">
    
    <div>
      <div class="business-logo">
        <img src="labonita.png">
      </div>

      <div class="menu">
        <button onclick="mostrarInicio()">🏠 Inicio</button>
        <button onclick="verPedidos()">📦 Pedidos</button>
        <button onclick="verProductos()">🛒 Productos</button>
        <button onclick="logout()">🚪</button>
      </div>
    </div>

    <button class="logout" onclick="logout()">Cerrar sesión</button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h2>Dashboard</h2>
      <img src="logoDenix.png" class="logo-denix">
    </div>

    <div id="contenido"></div>

    <div class="grid" id="contenedor"></div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
