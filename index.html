<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DENIX</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

/* LOGIN */
.login-container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #020617;
  padding: 30px;
  border-radius: 16px;
  width: 320px;
  text-align: center;
}

.logo {
  width: 80px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: #020617;
  padding: 20px;
  height: 100vh;
  position: fixed;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  background: #1e293b;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.sidebar button:hover {
  background: #334155;
}

/* LOGOUT */
.logout {
  background: red;
}

/* MAIN */
.main {
  margin-left: 250px;
  padding: 20px;
}

.header {
  font-size: 24px;
  margin-bottom: 20px;
}

/* GRID */
#contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
}

/* STATUS */
.status {
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
}

.processing { background: orange; }
.completed { background: green; }
.pendiente { background: gray; }

/* FORM */
textarea, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button.action {
  margin-top: 5px;
  background: #22c55e;
  border: none;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
}

button.delete {
  background: red;
}

button.edit {
  background: #3b82f6;
  margin-bottom: 5px;
}

button.login-btn {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #f97316;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginScreen">
  <div class="login-box">
    
    <img src="logoDenix.png" class="logo">

    <h2>DENIX</h2>

    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <button class="login-btn" onclick="login()">Ingresar</button>

  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <!-- SIDEBAR -->
  <div class="sidebar">
    
    <div>
      <h2>🌮 Taqueria</h2>
      <button onclick="verPedidos()">📦 Pedidos</button>
      <button onclick="verProductos()">🛒 Productos</button>
    </div>

    <!-- LOGOUT ABAJO -->
    <div>
      <button class="logout" onclick="logout()">Cerrar sesión</button>
    </div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      Welcome to Taqueria La Bonita
    </div>

    <!-- FORM PRODUCTO -->
    <div id="formProducto" style="display:none;">
      <h3>➕ Crear / Editar Producto</h3>

      <input id="nombre" placeholder="Nombre">
      <input id="precio" placeholder="Precio">
      <input id="sku" placeholder="SKU">

      <textarea id="descripcion" placeholder="Descripción"></textarea>

      <select id="categoria"></select>

      <button class="action" onclick="guardarProducto()">Guardar</button>
    </div>

    <div id="contenedor"></div>

  </div>

</div>

<script>

let pedidosGlobal = [];
let productosGlobal = [];
let productoEditando = null;

// LOGIN
function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  if(email === "admin" && password === "1234") {
    localStorage.setItem("login", "true");
    document.getElementById('loginScreen').style.display = "none";
    document.getElementById('dashboard').style.display = "block";
  } else {
    alert("Credenciales incorrectas");
  }
}

// AUTO LOGIN
if(localStorage.getItem("login") === "true") {
  document.getElementById('loginScreen').style.display = "none";
  document.getElementById('dashboard').style.display = "block";
}

// LOGOUT
function logout() {
  localStorage.removeItem("login");
  location.reload();
}

// =======================
// PEDIDOS
// =======================
async function verPedidos() {

  document.getElementById('formProducto').style.display = 'none';

  const res = await fetch('https://taqueria-dashboard.onrender.com/orders-complete');
  pedidosGlobal = await res.json();

  const contenedor = document.getElementById('contenedor');
  contenedor.innerHTML = '';

  pedidosGlobal.forEach(p => {
    const div = document.createElement('div');
    div.classList.add('card');

    div.innerHTML = `
      <h3>Pedido #${p.id}</h3>
      <p>💰 $${p.total}</p>

      <span class="status ${p.estado}">
        ${p.estado}
      </span>

      <p>🚚 ${p.estado_envio || "pendiente"}</p>
      <p>👤 ${p.driver_name || "no asignado"}</p>
    `;

    contenedor.appendChild(div);
  });
}

// =======================
// CATEGORÍAS
// =======================
async function cargarCategorias() {
  const res = await fetch('https://taqueria-dashboard.onrender.com/categories');
  const data = await res.json();

  const select = document.getElementById('categoria');
  select.innerHTML = '';

  data.forEach(cat => {
    const option = document.createElement('option');
    option.value = cat.id;
    option.textContent = cat.name;
    select.appendChild(option);
  });
}

// =======================
// PRODUCTOS
// =======================
async function verProductos() {

  document.getElementById('formProducto').style.display = 'block';

  await cargarCategorias();

  const res = await fetch('https://taqueria-dashboard.onrender.com/products');
  productosGlobal = await res.json();

  const contenedor = document.getElementById('contenedor');
  contenedor.innerHTML = '';

  productosGlobal.forEach(p => {
    const div = document.createElement('div');
    div.classList.add('card');

    div.innerHTML = `
      <h3>${p.name}</h3>
      <p>$${p.price}</p>

      <button class="edit" onclick="editarProducto(${p.id})">✏️ Editar</button>
      <button class="delete" onclick="eliminarProducto(${p.id})">❌ Eliminar</button>
    `;

    contenedor.appendChild(div);
  });
}

// EDITAR
function editarProducto(id) {
  const producto = productosGlobal.find(p => p.id === id);

  productoEditando = producto.id;

  document.getElementById('nombre').value = producto.name;
  document.getElementById('precio').value = producto.price;
  document.getElementById('sku').value = producto.sku || '';
  document.getElementById('descripcion').value = producto.description || '';

  if (producto.categories.length > 0) {
    document.getElementById('categoria').value = producto.categories[0].id;
  }
}

// GUARDAR
async function guardarProducto() {

  const nombre = document.getElementById('nombre').value;
  const precio = document.getElementById('precio').value;
  const sku = document.getElementById('sku').value;
  const descripcion = document.getElementById('descripcion').value;
  const categoria = document.getElementById('categoria').value;

  const data = {
    name: nombre,
    type: "simple",
    regular_price: precio,
    sku: sku,
    description: descripcion,
    categories: [{ id: parseInt(categoria) }]
  };

  if (productoEditando) {
    await fetch(`https://taqueria-dashboard.onrender.com/products/${productoEditando}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    alert("Producto actualizado 🔥");
  } else {
    await fetch('https://taqueria-dashboard.onrender.com/products', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    alert("Producto creado 🔥");
  }

  productoEditando = null;
  verProductos();
}

// ELIMINAR
async function eliminarProducto(id) {
  await fetch(`https://taqueria-dashboard.onrender.com/products/${id}`, {
    method: 'DELETE'
  });
  alert("Producto eliminado ❌");
  verProductos();
}

// INICIO
verPedidos();

</script>

</body>
</html>
